name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build pomi.app
        run: ./scripts/build_app.sh

      - name: Zip app
        run: ditto -c -k --sequesterRsrc --keepParent pomi.app pomi.app.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pomi.app.zip
          generate_release_notes: true
