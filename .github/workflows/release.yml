name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Create app bundle
        run: |
          mkdir -p pomi.app/Contents/MacOS
          mkdir -p pomi.app/Contents/Resources
          cp .build/release/pomi pomi.app/Contents/MacOS/pomi
          cp pomi.app.template/Contents/Info.plist pomi.app/Contents/Info.plist

      - name: Generate app icon
        run: |
          swift scripts/generate_icon.swift
          iconutil -c icns AppIcon.iconset -o pomi.app/Contents/Resources/AppIcon.icns

      - name: Zip app
        run: ditto -c -k --sequesterRsrc --keepParent pomi.app pomi.app.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pomi.app.zip
          generate_release_notes: true
